schemaVersion: "2"
kind: sandbox
name: nanobot
displayName: Nanobot
description: Lightweight personal AI assistant with multi-platform chat and multi-provider LLM support
sandbox:
    image: docker/sandbox-templates:shell-docker
    aiFilename: AGENTS.md
    entrypoint:
        run:
            - nanobot
            - agent
            - --config
            - /home/agent/.nanobot/config.json
caps:
    network:
        allow:
            - pypi.org
            - files.pythonhosted.org
            - '*.telegram.org'
            - '*.discord.com'
            - gateway.discord.gg
            - '*.whatsapp.com'
            - '*.whatsapp.net'
            - '*.slack.com'
            - '*.feishu.cn'
credentials:
    - service: anthropic
      apiKey:
        name: ANTHROPIC_API_KEY
        proxyManaged: true
        inject:
            - domain: api.anthropic.com
              header: x-api-key
              format: '%s'
            - domain: claude.ai
              header: x-api-key
              format: '%s'
            - domain: console.anthropic.com
              header: x-api-key
              format: '%s'
environment:
    variables:
        NANOBOT_AGENTS__DEFAULTS__WORKSPACE: /home/agent/nanobot
commands:
    install:
        - command: pip install --break-system-packages nanobot-ai
          user: "1000"
          description: Install nanobot
